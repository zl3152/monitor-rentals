<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monitor Rentals</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --ink: #1d2429;
        --muted: #67737c;
        --line: #d8ded6;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --warn: #b45309;
        --bad: #b91c1c;
        --good: #166534;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }

      a { color: var(--accent-dark); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 4vw, 2.5rem);
        letter-spacing: 0;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 14px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        font-weight: 700;
        white-space: nowrap;
      }

      .button.secondary {
        background: transparent;
        color: var(--accent-dark);
      }

      .button[disabled] {
        cursor: wait;
        opacity: 0.72;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .toolbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 24px 0 10px;
      }

      .section-header h2 {
        margin: 0;
        font-size: 1.15rem;
        letter-spacing: 0;
      }

      .filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 700;
      }

      input, select, textarea {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        background: white;
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        padding: 13px 14px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      tr:last-child td { border-bottom: 0; }

      .name {
        font-weight: 800;
      }

      .meta {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border-radius: 999px;
        background: #edf2ef;
        color: #33433d;
        font-size: 0.82rem;
        font-weight: 800;
      }

      .badge.good { background: #dcfce7; color: var(--good); }
      .badge.warn { background: #fef3c7; color: var(--warn); }
      .badge.bad { background: #fee2e2; color: var(--bad); }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        padding: 18px;
      }

      .full { grid-column: 1 / -1; }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 0 18px 18px;
      }

      .empty {
        padding: 34px 18px;
        color: var(--muted);
        text-align: center;
      }

      .notice {
        margin-bottom: 16px;
        padding: 12px 14px;
        font-weight: 800;
      }

      .notice.good {
        border-color: #86efac;
        background: #f0fdf4;
        color: var(--good);
      }

      .notice.bad {
        border-color: #fecaca;
        background: #fef2f2;
        color: var(--bad);
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      @media (max-width: 760px) {
        header, .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .section-header {
          align-items: stretch;
          flex-direction: column;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        table, thead, tbody, th, td, tr {
          display: block;
        }

        thead { display: none; }

        tr {
          border-bottom: 1px solid var(--line);
          padding: 10px 0;
        }

        td {
          border-bottom: 0;
          padding: 7px 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
    <script>
      document.querySelectorAll("form[data-pending-label]").forEach((form) => {
        form.addEventListener("submit", () => {
          const button = form.querySelector("button[type='submit']");
          if (!button) return;
          button.textContent = form.dataset.pendingLabel;
          button.disabled = true;
        });
      });
    </script>
  </body>
</html>
